<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Resource Hints for external origins -->
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" />
    <link rel="preconnect" href="https://kit.fontawesome.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin />
    <link rel="dns-prefetch" href="https://kit.fontawesome.com" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />

    <!--
      ⚠️  REMOVED: hardcoded <link rel="preload"> for project images.
      
      WHY they were broken:
        1. These preloads fire on EVERY page load regardless of route.
           When users land on /projects, /about, etc. the images are never
           used within the browser's timeout window → "preloaded but not used".
        2. vite-imagetools converts assets to .webp at build time, but the
           preload tags referenced .jpg — format mismatch caused the browser
           to fetch the same image twice (once as preload .jpg, once as .webp).
      
      REPLACEMENT: route-aware preload injected by the inline script below.
        • Only runs when the user is actually on the home page ("/").
        • Reads the correct .webp extension that vite-imagetools outputs.
        • Zero preload waste on all other routes.
    -->

    <!-- Route-aware LCP preload — home page only, correct webp format -->
    <script>
      (function () {
        // Only preload on the home route — avoids "preloaded but not used" on all other pages
        if (window.location.pathname !== "/") return;

        var lcpImages = [
          "/assets/images/exterior-min.jpg",
          "/assets/images/pov5-min.jpg",
          "/assets/images/POV3_OPTIONAL-min.jpg",
        ];

        // Check webp support once
        var supportsWebp = (function () {
          var c = document.createElement("canvas");
          return c.toDataURL("image/webp").indexOf("data:image/webp") === 0;
        })();

        lcpImages.forEach(function (href) {
          var link = document.createElement("link");
          link.rel = "preload";
          link.as = "image";
          // Use .webp if supported (matches vite-imagetools output), else jpg fallback
          link.href = supportsWebp
            ? href.replace(/\.(jpg|jpeg|png)$/i, ".webp")
            : href;
          link.setAttribute("fetchpriority", "high");
          link.setAttribute(
            "imagesizes",
            "(max-width: 768px) 100vw, (max-width: 1280px) 50vw, 25vw",
          );
          document.head.appendChild(link);
        });
      })();
    </script>

    <!-- Critical CSS -->
    <link href="/src/index.css" rel="stylesheet" />

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/assets/images/mini-logo.png" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="/assets/faviicons/favicon.svg"
    />
    <link rel="shortcut icon" href="/assets/faviicons/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/faviicons/apple-touch-icon.png"
    />
    <link rel="manifest" href="/assets/faviicons/site.webmanifest" />

    <!-- FontAwesome — deferred, non-critical -->
    <script
      src="https://kit.fontawesome.com/08b13d1b0c.js"
      crossorigin="anonymous"
      defer
    ></script>

    <!-- SEO Meta Tags -->
    <title>
      LTR Studio - Professional 3D Visualization & Architectural Design
    </title>
    <meta
      name="description"
      content="LTR Studio specializes in high-quality 3D visualization, architectural design, and interior rendering. Transform your ideas into stunning visual reality."
    />
    <meta
      name="keywords"
      content="ltr, LTR Studio, 3D visualization, architectural design, interior design, rendering, Vietnam architecture"
    />

    <!-- Open Graph -->
    <meta
      property="og:title"
      content="LTR Studio - Professional 3D Visualization & Design"
    />
    <meta
      property="og:description"
      content="Transform your architectural ideas into stunning visual reality with LTR Studio's professional 3D visualization services."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ltrvisuals.com" />
    <meta

      content="https://ltrvisuals.com/assets/images/og1-image.png"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="LTR Studio - Professional 3D Design" />
    <meta
      name="twitter:description"
      content="Expert 3D visualization and architectural design services by LTR Studio."
    />
    <meta
      name="twitter:image"
      content="https://ltrvisuals.com/assets/images/og1-image.png"
    />

    <!-- Canonical -->
    <link rel="canonical" href="https://ltrvisuals.com" />

    <!-- Three.js shaders -->
    <script type="x-shader/x-vertex" id="vertexshader">
      attribute float size;
      attribute vec3 customColor;
      varying vec3 vColor;
      void main() {
        vColor = customColor;
        vec4 mvPosition = modelViewMatrix * vec4( position, 1.0 );
        gl_PointSize = size * ( 300.0 / -mvPosition.z );
        gl_Position = projectionMatrix * mvPosition;
      }
    </script>
    <script type="x-shader/x-fragment" id="fragmentshader">
      uniform vec3 color;
      uniform sampler2D pointTexture;
      varying vec3 vColor;
      void main() {
        gl_FragColor = vec4( color * vColor, 1.0 );
        gl_FragColor = gl_FragColor * texture2D( pointTexture, gl_PointCoord );
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Three.js deferred — must not block LCP -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r125/three.min.js"
      defer
    ></script>
  </body>
</html>
